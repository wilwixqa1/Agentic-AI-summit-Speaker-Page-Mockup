<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Agentic AI Summit 2026 — Speakers{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/base.css">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="brand">
        <img src="/static/img/rdi-logo.png" alt="Berkeley RDI" class="brand-logo" />
        <span class="brand-product">Agentic AI Summit</span>
      </a>
      <nav class="site-nav">
        <a href="https://rdi.berkeley.edu/events/agentic-ai-summit-2026" target="_blank" rel="noopener">Summit Page ↗</a>
      </nav>
    </div>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <footer class="site-footer">
    <div class="container">
      <p>Berkeley Center for Responsible, Decentralized Intelligence</p>
      <p style="color: var(--muted);">Speaker page mockup — internal review only</p>
    </div>
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
